name: generate animation

on:
  # run automatically every 6 hours
  schedule:
    - cron: "30 5 * * *"

  # allows to manually run the job at any time
  workflow_dispatch:

  # run when this workflow changes on the main branch
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main.yml"

permissions:
  contents: write

concurrency:
  group: output-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      # publish the generated SVGs without deleting other output branch assets
      - name: publish github-contribution-grid-snake.svg to the output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: true
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          full_commit_message: Update contribution snake
